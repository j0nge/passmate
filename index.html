<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f1115">
  <title>Passmate · 농구 스코어보드</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8F%80%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="brand">
        <span class="logo">🏀</span>
        <span class="title">PASSMATE</span>
      </div>
      <div class="topbar-actions">
        <button id="toggleEdit" class="btn ghost">편집</button>
        <button id="resetAllBtn" class="btn ghost danger">초기화</button>
      </div>
    </header>

    <section class="timer-section">
      <div class="matchup-bar">
        <span class="quarter-pill"><span class="quarter-pill-label">Q</span><span id="quarterValue">1</span></span>
        <button id="matchupBtn" class="matchup-select" type="button">
          <span class="mu-team mu-a"><span class="mu-dot" id="muDotA"></span><span id="muNameA">A팀</span></span>
          <span class="mu-vs">vs</span>
          <span class="mu-team mu-b"><span class="mu-dot" id="muDotB"></span><span id="muNameB">B팀</span></span>
          <span class="mu-edit">✎</span>
        </button>
      </div>
      <div class="timer-row">
        <div id="timerDisplay" class="timer-display">08:00</div>
        <button id="editTimerBtn" class="btn small ghost timer-config" aria-label="시간 설정">⚙️</button>
      </div>
      <div class="timer-controls">
        <button id="startStopBtn" class="btn primary big">시작</button>
        <button id="resetTimerBtn" class="btn ghost">리셋</button>
        <button id="nextQuarterBtn" class="btn">다음 쿼터 →</button>
        <button id="changeMatchupBtn" class="btn ghost matchup-inline-edit">✎ 매치업</button>
      </div>
    </section>

    <section id="teamsSection" class="teams-section"></section>

    <section class="pairings-section">
      <h2 class="section-title">매치업 누적</h2>
      <div id="pairingsList" class="pairings-list"></div>
    </section>

    <section class="record-section">
      <h2 class="section-title">쿼터 기록</h2>
      <div class="record-table-wrap">
        <table id="recordTable" class="record-table"></table>
      </div>
    </section>

    <footer class="action-footer">
      <button id="undoBtn" class="btn ghost">↶ 되돌리기</button>
      <button id="addTeamBtn" class="btn edit-only">+ 팀 추가</button>
    </footer>
  </div>

  <div id="timerModal" class="modal hidden">
    <div class="modal-content">
      <h2>쿼터 시간 설정</h2>
      <div class="time-input">
        <input type="number" id="minutesInput" min="0" max="60" value="8" inputmode="numeric">
        <span>분</span>
        <input type="number" id="secondsInput" min="0" max="59" value="0" inputmode="numeric">
        <span>초</span>
      </div>
      <div class="modal-actions">
        <button class="btn ghost modal-cancel">취소</button>
        <button id="saveTimerBtn" class="btn primary">저장</button>
      </div>
    </div>
  </div>

  <div id="matchupModal" class="modal hidden">
    <div class="modal-content">
      <h2>이번 쿼터 매치업</h2>
      <p class="muted">두 팀을 선택하세요</p>
      <div class="matchup-pickers">
        <div class="picker">
          <div class="picker-label">팀 1</div>
          <div class="picker-options" id="pickerA"></div>
        </div>
        <div class="picker">
          <div class="picker-label">팀 2</div>
          <div class="picker-options" id="pickerB"></div>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn ghost modal-cancel">취소</button>
        <button id="saveMatchupBtn" class="btn primary">저장</button>
      </div>
    </div>
  </div>

  <div id="confirmModal" class="modal hidden">
    <div class="modal-content">
      <h2 id="confirmTitle">확인</h2>
      <p id="confirmMessage"></p>
      <div class="modal-actions">
        <button class="btn ghost modal-cancel">취소</button>
        <button id="confirmOkBtn" class="btn primary danger">확인</button>
      </div>
    </div>
  </div>

  <div id="promptModal" class="modal hidden">
    <div class="modal-content">
      <h2 id="promptTitle">입력</h2>
      <input type="text" id="promptInput" class="prompt-input">
      <div class="modal-actions">
        <button class="btn ghost modal-cancel">취소</button>
        <button id="promptOkBtn" class="btn primary">확인</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
